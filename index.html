<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    
@import url('https://fonts.googleapis.com/css2?family=Courgette&family=Great+Vibes&display=swap');

*{
 font-family: "Great Vibes", cursive;
  font-weight: 400;
  font-style: normal;
    padding: 0;
    margin: 0;
}
.body{
    height: 100vh;
    overflow: hidden;
}
.container{
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.container .video{
    z-index: -1;
    width: 100%;
    height: 200%;
    position: fixed;
}
.con-data{
    background-color: white;
    width: 50%;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1;
    border-radius: 20px;
    box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
    gap: 50px;
}
.con-data2{
    display: none;
    background-color: white;
     width: 50%;
    height: 300px;
    text-align: center;
    border-radius: 20px;
    box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
}
.con-data2 h1{
     font-size: 40px;
     display: flex;
     flex-direction: column;
     padding: 10px;

}
.box2{
    display: flex;
    gap: 50px;
}
.box1 h1{
    font-size: 50px;
}

.box2 #btn1,#btn2{
    padding: 10px 30px;
    background-color: red;
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 5px;
    transition: all 0.5s ease-in-out;
    font-size: 20px;

}
.box2 #btn1:hover,#btn2:hover{
    background-color: rgb(214, 156, 156);
    color: black;
    box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
}
.v1{
    width: 200px;
    height: 200px;
    object-fit: cover;
}
@media(max-width:1000px){
    body{
        display: none;
    }
}
</style>
<body>
      <div class="container">
    <video class="video" autoplay muted loop>
        <source src="val-video.mp4" type="video/mp4">

        </video>
        <div class="con-data">
        <div class="box1">
            <h1 class="h1">Pavani,will you be my valentine</h1>
        </div>
        <div class="box2">
            <button id="btn1">yes</button>
            <button id="btn2">No</button>
        </div>
    </div>
    <div class="con-data2">
        <h1>That's so sweet</h1>
        <video class="v1" autoplay muted loop>
        <source src="greet.mp4" type="video/mp4">

        </video>
    </div>
    </div>
    <script>
        const data=document.querySelector(".con-data")
const data2=document.querySelector(".con-data2")
const btn1=document.querySelector("#btn1")
const btn2=document.querySelector("#btn2")
btn1.addEventListener("click",()=>{
    data.style.display="none"
    data2.style.display="block"
})
btn2.addEventListener("mouseenter",()=>{
const length=window.innerWidth-btn2.offsetWidth;
const height=window.innerHeight-btn2.offsetHeight;
const x=Math.floor(Math.random()*length);
const y=Math.floor(Math.random()*height);
btn2.style.position="absolute";
btn2.style.left=x+"px";
btn2.style.top=y+"px";

})
    </script>
</body>
</html>
